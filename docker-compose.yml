services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: leoclube_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - leoclube-network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=db.fr-pari1.bengt.wasmernet.com
      - DB_PORT=10272
      - DB_DATABASE=leoclube
      - DB_USERNAME=4981dd827a938000e0359420b880
      - DB_PASSWORD=06994981-dd82-7bc6-8000-6233c72c22cf
      #- DB_HOST=mysql
      #- DB_PORT=3306
      #- DB_DATABASE=leoclube
      #- DB_USERNAME=leoclube_user
      #- DB_PASSWORD=leoclube_password
    entrypoint: ["/bin/bash", "/usr/local/bin/entrypoint.sh"]
    command: php-fpm

  nginx:
    image: nginx:alpine
    container_name: leoclube_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - leoclube-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: leoclube_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: leoclube
      MYSQL_USER: leoclube_user
      MYSQL_PASSWORD: leoclube_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - leoclube-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  leoclube-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
